name: Playce

options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 63U9A75L6R
    CODE_SIGN_STYLE: Automatic

targets:
  PlayceIOS:
    type: application
    platform: iOS
    sources:
      - path: iOS
      - path: Shared
      - path: Resources
    dependencies:
      - target: PlayceWatchApp
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agm.playce
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PLAYCE
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PlayceWatchApp:
    type: application
    platform: watchOS
    entitlements:
      path: Watch/PlayceWatchApp.entitlements
      properties:
        com.apple.developer.healthkit: true
    sources:
      - path: Watch
      - path: Shared
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agm.playce.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PLAYCE
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.agm.playce
        INFOPLIST_KEY_NSHealthShareUsageDescription: PLAYCE reads workout data to keep tennis sessions active on Apple Watch.
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: PLAYCE writes tennis workouts while you track matches on Apple Watch.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PlayceSharedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Shared
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agm.playce.sharedtests
        GENERATE_INFOPLIST_FILE: YES
